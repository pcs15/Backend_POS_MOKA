</section>

<div class="flex items-center justify-between">

</div>
<div class="grid grid-cols-2 md:grid-cols-3 gap-md">

<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">today</span>
<span class="font-label-md text-label-md">Today</span>
</div>
<div>
<p class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold mb-1">42</p>

<div>

</div>

</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>

<div class="w-10 h-10 rounded-full bg-error-container/50 flex items-center justify-center group-hover:bg-error transition-colors">
