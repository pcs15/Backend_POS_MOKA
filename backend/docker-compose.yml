version: '3.8'

services:
  # 1. Service Database MySQL
  db:
    image: mysql:8.0
    container_name: pos_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root  # Sesuaikan dengan DB_PASSWORD di .env
      MYSQL_DATABASE: pos_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Baris di bawah ini akan otomatis mengeksekusi schema.sql saat DB pertama kali dibuat
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
    restart: unless-stopped

  # 2. Service Backend Node.js
  backend:
    build: .
    container_name: pos_backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db      # Penting! Kita menggunakan nama service 'db', bukan 'localhost'
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=pos_db
      - PORT=5000
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads # Menyimpan gambar upload agar tidak hilang
    restart: unless-stopped

  # 3. Service Ngrok
  ngrok:
    image: ngrok/ngrok:latest
    container_name: pos_ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    # Command ini menyuruh ngrok meneruskan trafik ke service 'backend' port 5000
    command: "http backend:5000"
    depends_on:
      - backend
    ports:
      - "4040:4040"
    restart: unless-stopped

  # 4. Service phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pos_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8088:80"
    depends_on:
      - db
    restart: unless-stopped

# Mendefinisikan volume lokal agar data MySQL tidak hilang saat Docker dimatikan
volumes:
  db_data:
